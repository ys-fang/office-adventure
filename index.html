   JOURNAL: LOG TAB
   ---------------------------------------------------------------- */
function renderLogTab() {
  var container = $('journal-content');
  clearEl(container);

  // Summary
  var visitCount = Object.keys(G.visited).length;
  var choiceCount = G.log.filter(function (e) { return e.type === 'choice'; }).length;
  var summary = el('div', 'log-summary');
  var s1 = el('strong', null, visitCount + ' 個場景');
  var s2 = el('strong', null, choiceCount + ' 個選擇');
  var s3 = el('strong', null, G.collectibles.length + ' 件收藏品');
  summary.appendChild(document.createTextNode('已探索 '));
  summary.appendChild(s1);
  summary.appendChild(document.createTextNode('，做了 '));
  summary.appendChild(s2);
  summary.appendChild(document.createTextNode('，收集了 '));
  summary.appendChild(s3);
  container.appendChild(summary);

  if (G.log.length === 0) return;

  // Timeline
  var timeline = el('div', 'log-timeline');

  for (var i = 0; i < G.log.length; i++) {
    var entry = G.log[i];
    var room = G.roomMap[entry.room];
    var roomTitle = room ? room.title : entry.room;

    var div = el('div', 'log-entry');

    if (entry.type === 'enter') {
      div.classList.add('entry-enter');

      var time = el('div', 'log-entry-time');
      var d = new Date(entry.time);
      time.textContent = d.getHours() + ':' + ('0' + d.getMinutes()).slice(-2);
      div.appendChild(time);

      var rn = el('div', 'log-entry-room', roomTitle);
      div.appendChild(rn);

      var act = el('div', 'log-entry-action');
      if (entry.direction) {
        act.textContent = entry.direction + ' 進入';
      } else {
        act.textContent = '開始探險';
      }
      div.appendChild(act);
    } else if (entry.type === 'choice') {
      div.classList.add('entry-choice');

      var time2 = el('div', 'log-entry-time');
      var d2 = new Date(entry.time);
      time2.textContent = d2.getHours() + ':' + ('0' + d2.getMinutes()).slice(-2);
      div.appendChild(time2);

      var rn2 = el('div', 'log-entry-room', roomTitle);
      div.appendChild(rn2);

      var act2 = el('div', 'log-entry-action', entry.action);
      div.appendChild(act2);

      if (entry.result) {
        var res = el('div', 'log-entry-result');
        var resultText = entry.result;
        if (resultText.length > 80) resultText = resultText.substring(0, 80) + '...';
        res.textContent = resultText;
        div.appendChild(res);
      }
    }

    timeline.appendChild(div);
  }

  container.appendChild(timeline);
}

/* ----------------------------------------------------------------
   JOURNAL: PROFILE TAB (Explorer Personality)
   ---------------------------------------------------------------- */
function renderProfileTab() {
  var container = $('journal-content');
  clearEl(container);

  var totalChoices = G.log.filter(function (e) { return e.type === 'choice'; }).length;

  if (totalChoices < 2) {
    container.appendChild(el('div', 'profile-empty', '再多探索一些場景...'));
    return;
  }

  var section = el('div', 'profile-section');

  // Radar chart
  var canvasWrap = el('div', 'profile-canvas-wrap');
  var canvas = el('canvas');
  var sz = 240;
  canvas.width = sz * 2; canvas.height = sz * 2;
  canvas.style.width = sz + 'px'; canvas.style.height = sz + 'px';
  canvasWrap.appendChild(canvas);
  section.appendChild(canvasWrap);

  drawRadarChart(canvas, sz);

  // Personality type
  var dominant = getDominantTrait();
  section.appendChild(el('div', 'profile-type-name', dominant.label));
  section.appendChild(el('div', 'profile-type-desc', dominant.desc));

  // Stats
  var stats = el('div', 'profile-stats');
  for (var i = 0; i < TRAIT_KEYS.length; i++) {
    var stat = el('div', 'profile-stat');
    var val = el('div', 'profile-stat-value', '' + G.traits[TRAIT_KEYS[i]]);
    val.style.color = TRAIT_COLORS[i];
    stat.appendChild(val);
    stat.appendChild(el('div', 'profile-stat-label', TRAIT_LABELS[i]));
    stats.appendChild(stat);
  }
  section.appendChild(stats);

  container.appendChild(section);
}

function drawRadarChart(canvas, sz) {
  var ctx = canvas.getContext('2d');
  var dpr = 2; // canvas is already 2x
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, sz, sz);

  var cx = sz / 2, cy = sz / 2;
  var maxR = sz * 0.35;
  var axes = 4;
  var angleOffset = -Math.PI / 2; // start from top

  // Find max trait value for normalization
  var maxVal = 1;
  for (var i = 0; i < TRAIT_KEYS.length; i++) {
    if (G.traits[TRAIT_KEYS[i]] > maxVal) maxVal = G.traits[TRAIT_KEYS[i]];
  }

  // Draw grid circles
  for (var ring = 1; ring <= 3; ring++) {
    var r = maxR * ring / 3;
    ctx.beginPath();
    for (var a = 0; a < axes; a++) {
      var angle = angleOffset + (Math.PI * 2 / axes) * a;
      var x = cx + Math.cos(angle) * r;
      var y = cy + Math.sin(angle) * r;
      if (a === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(51,48,43,0.6)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw axes
  for (var a = 0; a < axes; a++) {
    var angle = angleOffset + (Math.PI * 2 / axes) * a;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(angle) * maxR, cy + Math.sin(angle) * maxR);
    ctx.strokeStyle = 'rgba(51,48,43,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  // Draw data polygon
  ctx.beginPath();
  for (var a = 0; a < axes; a++) {
    var angle = angleOffset + (Math.PI * 2 / axes) * a;
    var val = G.traits[TRAIT_KEYS[a]] / maxVal;
    var r2 = maxR * Math.max(val, 0.08); // minimum visible
    var x = cx + Math.cos(angle) * r2;
    var y = cy + Math.sin(angle) * r2;
    if (a === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(224,180,130,0.2)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(224,180,130,0.8)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Draw data points
  for (var a = 0; a < axes; a++) {
    var angle = angleOffset + (Math.PI * 2 / axes) * a;
    var val = G.traits[TRAIT_KEYS[a]] / maxVal;
    var r3 = maxR * Math.max(val, 0.08);
    var x = cx + Math.cos(angle) * r3;
    var y = cy + Math.sin(angle) * r3;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = TRAIT_COLORS[a];
    ctx.fill();
  }

  // Draw labels
  ctx.font = '13px "Noto Sans TC"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (var a = 0; a < axes; a++) {
    var angle = angleOffset + (Math.PI * 2 / axes) * a;
    var labelR = maxR + 22;
    var x = cx + Math.cos(angle) * labelR;
    var y = cy + Math.sin(angle) * labelR;
    ctx.fillStyle = TRAIT_COLORS[a];
    ctx.fillText(TRAIT_LABELS[a], x, y);
  }
}

/* ----------------------------------------------------------------
   JOURNAL: COLLECTIBLES TAB
   ---------------------------------------------------------------- */
function renderCollectiblesTab() {
  var container = $('journal-content');
  clearEl(container);

  if (G.collectibles.length === 0) {
    container.appendChild(el('div', 'collectibles-empty', '\u9084\u6C92\u6709\u6536\u85CF\u54C1\uFF0C\u8A66\u8A66\u770B\u8DDF\u5834\u666F\u4E92\u52D5\u5427'));
    return;
  }

  var countDiv = el('div', 'collectibles-count', '\u5DF2\u6536\u96C6 ' + G.collectibles.length + ' \u4EF6\u6536\u85CF\u54C1');
  container.appendChild(countDiv);

  var grid = el('div', 'collectibles-grid');
  for (var i = 0; i < G.collectibles.length; i++) {
    var item = G.collectibles[i];
    var card = el('div', 'collectible-card');
    card.appendChild(el('div', 'collectible-card-name', item.name));
    card.appendChild(el('div', 'collectible-card-room', item.roomTitle));
    grid.appendChild(card);
  }
  container.appendChild(grid);
}

/* ----------------------------------------------------------------
   JOURNAL TAB SWITCHING
   ---------------------------------------------------------------- */
var currentTab = 'story';

function switchTab(tab) {
  currentTab = tab;
  var tabs = document.querySelectorAll('.journal-tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', tabs[i].getAttribute('data-tab') === tab);
  }

  if (tab === 'story') renderStoryTab();
  else if (tab === 'log') renderLogTab();
  else if (tab === 'profile') renderProfileTab();
  else if (tab === 'collectibles') renderCollectiblesTab();
}

/* ----------------------------------------------------------------
   EVENT BINDINGS
   ---------------------------------------------------------------- */
function bindEvents() {
  // Start button
  $('btn-start').addEventListener('click', function () {
    stopDust();
    $('welcome-screen').classList.add('hidden');
    $('game-screen').classList.add('active');

    // Enter first room
    // Random starting room (different for each player)
    var startIdx = Math.floor(Math.random() * G.rooms.length);
    enterRoom(G.rooms[startIdx].filename);
  });

  // Welcome reset button
  $('btn-welcome-reset').addEventListener('click', function () {
    if (confirm('確定要重置所有進度嗎？')) { clearSave(); location.reload(); }
  });

  // Admin / cheat button
  $('btn-admin').addEventListener('click', function () {
    stopDust();
    showAdminView();
  });

  // Continue button
  $('btn-continue').addEventListener('click', function () {
    stopDust();
    $('welcome-screen').classList.add('hidden');
    $('game-screen').classList.add('active');

    renderRoom();
    updateProgress();
    renderMinimap();
  });

  // Journal button
  $('btn-journal').addEventListener('click', function () {
    $('journal-overlay').classList.add('active');
    switchTab(currentTab);
  });

  // Journal tabs
  $('tab-story').addEventListener('click', function () { switchTab('story'); });
  $('tab-log').addEventListener('click', function () { switchTab('log'); });
  $('tab-profile').addEventListener('click', function () { switchTab('profile'); });
  $('tab-collectibles').addEventListener('click', function () { switchTab('collectibles'); });

  // Journal close
  $('journal-close').addEventListener('click', function () {
    $('journal-overlay').classList.remove('active');
  });

  // Map buttons
  function openMapCentered() {
    $('map-overlay').classList.add('active');
    mapSt.sc = 1;
    // Center on current room
    var cellSize = 80 * mapSt.sc;
    var curPos = G.cur && G.positions[G.cur];
    if (curPos) {
      mapSt.px = -curPos.x * cellSize;
      mapSt.py = -curPos.y * cellSize;
    } else {
      mapSt.px = 0; mapSt.py = 0;
    }
    renderFullMap();
  }

  $('btn-map').addEventListener('click', openMapCentered);
  $('minimap-btn').addEventListener('click', openMapCentered);

  $('map-close').addEventListener('click', function () {
    $('map-overlay').classList.remove('active');
  });

  // Home button (return to welcome screen)
  $('btn-home').addEventListener('click', function () {
    save();
    $('game-screen').classList.remove('active');
    $('welcome-screen').classList.remove('hidden');
    // Update continue button with current progress
    var visitCount = Object.keys(G.visited).length;
    var continueBtn = $('btn-continue');
    continueBtn.textContent = '\u7E7C\u7E8C\u63A2\u96AA (\u5DF2\u63A2\u7D22 ' + visitCount + ' \u500B\u5834\u666F)';
    continueBtn.classList.remove('hidden');
    $('btn-welcome-reset').classList.remove('hidden');
    initDust();
  });
}

/* ----------------------------------------------------------------
   INIT -- Load rooms and start
   ---------------------------------------------------------------- */
function init() {
  // Check for verify mode
  var urlParams = new URLSearchParams(window.location.search);
  var verifyCode = urlParams.get('verify');
  if (verifyCode) {
    showVerifyPage(verifyCode);
    return;
  }

  // Fetch index
  fetch('contributors/index.md?t=' + Date.now())
    .then(function (r) { return r.text(); })
    .then(function (text) {
      var files = text.split('\n').map(function (l) { return l.trim(); }).filter(function (l) {
        return l && l.endsWith('.md') && l !== '_template.md' && l !== 'index.md';
      });

      if (!files.length) {
        $('loading-screen').classList.add('hidden');
        $('welcome-screen').classList.remove('hidden');
        return;
      }

      // Fetch all room files
      var promises = files.map(function (f) {
        return fetch('contributors/' + f + '?t=' + Date.now())
          .then(function (r) { return r.ok ? r.text() : ''; })
          .then(function (md) { return parseRoom(md, f); })
          .catch(function () { return null; });
      });

      return Promise.all(promises).then(function (rooms) {
        // Filter nulls and sort by filename
        rooms = rooms.filter(function (r) { return r !== null; });
        rooms.sort(function (a, b) { return a.filename.localeCompare(b.filename); });

        G.rooms = rooms;
        for (var i = 0; i < rooms.length; i++) {
          G.roomMap[rooms[i].filename] = rooms[i];
          G.roomIdx[rooms[i].filename] = i;
        }

        // Build connections
        buildConnections();

        // Assign hidden characters for collection quest
        assignHiddenChars();

        // Try to restore save
        var saved = loadSave();
        if (saved && saved.cur && G.roomMap[saved.cur]) {
          G.cur = saved.cur;

          // Clean stale data: filter out rooms that no longer exist
          var sv = saved.visited || {};
          var sc = saved.choices || {};
          var sr = saved.choiceResults || {};
          var cleanVisited = {}, cleanChoices = {}, cleanResults = {};
          for (var fn in sv) { if (G.roomMap[fn]) cleanVisited[fn] = true; }
          for (var fn in sc) { if (G.roomMap[fn]) cleanChoices[fn] = sc[fn]; }
          for (var fn in sr) { if (G.roomMap[fn]) cleanResults[fn] = sr[fn]; }
          G.visited = cleanVisited;
          G.choices = cleanChoices;
          G.choiceResults = cleanResults;

          // Filter log entries for existing rooms
          var savedLog = saved.log || [];
          G.log = [];
          for (var li = 0; li < savedLog.length; li++) {
            if (!savedLog[li].room || G.roomMap[savedLog[li].room]) G.log.push(savedLog[li]);
          }

          G.traits = saved.traits || { action: 0, observer: 0, adventurer: 0, warmheart: 0 };
          if (saved.collectedChars) G.collectedChars = saved.collectedChars;
          if (saved.collectibles) G.collectibles = saved.collectibles;
          if (saved.playerName) G.playerName = saved.playerName;
        }

        // Bind events
        bindEvents();
        initMapControls();

        // Hide loading, show welcome
        $('loading-screen').classList.add('hidden');
        $('welcome-screen').classList.remove('hidden');

        // Update subtitle
        $('welcome-subtitle').textContent = '由 ' + rooms.length + ' 位同事共同建造';

        // Show continue button if saved
        if (saved && saved.cur && G.roomMap[saved.cur]) {
          var visitCount = Object.keys(G.visited).length;
          var continueBtn = $('btn-continue');
          continueBtn.textContent = '繼續探險 (已探索 ' + visitCount + ' 個場景)';
          continueBtn.classList.remove('hidden');
          $('btn-welcome-reset').classList.remove('hidden');
        }

        // Check for admin mode
        if (window.location.search.indexOf('admin') !== -1) {
          $('welcome-screen').classList.add('hidden');
          showAdminView();
          return;
        }

        // Start dust particles
        initDust();
      });
    })
    .catch(function (err) {
      console.error('Failed to load rooms:', err);
      $('loading-screen').classList.add('hidden');
      $('welcome-screen').classList.remove('hidden');
      $('welcome-subtitle').textContent = '載入失敗，請重新整理頁面';
    });
}

/* ----------------------------------------------------------------
   ADMIN VIEW — full grid with all rooms and empty slots
   URL: ?admin
   ---------------------------------------------------------------- */
function showAdminView() {
  // Hide ALL game UI, enable scrolling
  $('app').style.display = 'none';
  document.body.style.overflow = 'auto';
  document.body.style.height = 'auto';
  document.documentElement.style.overflow = 'auto';
  document.documentElement.style.height = 'auto';

  // Build admin container
  var admin = el('div', 'admin-view');

  // Back button
  var backBtn = el('button', 'admin-back-btn', '返回首頁');
  backBtn.addEventListener('click', function () {
    location.href = location.pathname;
  });
  admin.appendChild(backBtn);

  var title = el('h1', 'admin-title', '作弊模式 -- 辦公室平面圖');
  admin.appendChild(title);

  var stats = el('div', 'admin-stats');
  var totalSlots = G.gridCols * G.gridRows;
  stats.textContent = '房間：' + G.rooms.length + ' / 網格：' + G.gridCols + ' x ' + G.gridRows + ' (' + totalSlots + ' 格) / 空位：' + (totalSlots - G.rooms.length);
  admin.appendChild(stats);

  // Build grid
  var gridEl = el('div', 'admin-grid');
  gridEl.style.gridTemplateColumns = 'repeat(' + G.gridCols + ', 1fr)';

  // Create a lookup: "x,y" -> room
  var posMap = {};
  for (var i = 0; i < G.rooms.length; i++) {
    var fn = G.rooms[i].filename;
    var p = G.positions[fn];
    if (p) posMap[p.x + ',' + p.y] = G.rooms[i];
  }

  for (var r = 0; r < G.gridRows; r++) {
    for (var c = 0; c < G.gridCols; c++) {
      var key = c + ',' + r;
      var room = posMap[key];
      var isCurrent = room && G.cur === room.filename;
      var cls = room ? ('admin-cell occupied' + (isCurrent ? ' current' : '')) : 'admin-cell empty';
      var cell = el('div', cls);

      if (room) {
        cell.appendChild(el('div', 'admin-cell-title', room.title));
        cell.appendChild(el('div', 'admin-cell-file', room.filename));

        // Show connections
        var cc = G.conns[room.filename];
        if (cc) {
          var dirs = [];
          for (var d in cc) dirs.push(d.replace('往', ''));
          if (dirs.length) {
            cell.appendChild(el('div', 'admin-cell-dirs', dirs.join(' ')));
          }
        }

        // Show interaction count
        cell.appendChild(el('div', 'admin-cell-info', room.interactions.length + ' 個互動'));
      } else {
        cell.appendChild(el('div', 'admin-cell-empty-label', '(' + c + ',' + r + ')'));
        cell.appendChild(el('div', 'admin-cell-empty-label', '空位'));
      }

      gridEl.appendChild(cell);
    }
  }

  admin.appendChild(gridEl);

  document.body.appendChild(admin);
}

// Start
init();

})();
</script>
